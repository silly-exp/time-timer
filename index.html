<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Time Timer — Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="controls">
      <div class="mode-row">
        <label>Mode :
          <select id="modeSelect">
            <option value="duree">Durée</option>
            <option value="heureFin">Heure de fin</option>
          </select>
        </label>
      </div>
      <div class="mode-controls" id="modeControls"></div>
    </section>

    <section class="timer-wrap">
      <div class="timer" id="timer">
        <svg id="svg" viewBox="-1 -1 2 2" preserveAspectRatio="xMidYMid meet" aria-hidden="false">
          <circle cx="0" cy="0" r="1" class="bg" />
          <path id="sector" class="sector" d="" />
          <!-- inner circle removed so sector originates from center -->
          <text id="timeLabel" x="0" y="0" text-anchor="middle" dominant-baseline="middle" font-size="0.22" class="time-text"></text>
        </svg>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
